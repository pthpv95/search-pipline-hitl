services:
  backend:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./runs:/app/runs
      - ./.trials.json:/app/.trials.json
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
